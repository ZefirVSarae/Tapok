name: Build TapokAntivirus
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon=icon.ico --name "TapokAntivirus_Setup" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Compiled_Virus
        path: dist/TapokAntivirus_Setup.exe
        
